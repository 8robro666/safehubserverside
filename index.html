<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Hub - Infected Games Monitor</title>
    <style>
        /* ... your existing styles ... */
    </style>
</head>
<body>
    <!-- ... your existing HTML ... -->

    <script>
        let socket = null;
        let serverData = { servers: [] };
        let selectedServerId = null;
        let selectedPlayer = null;
        let currentPage = 'servers';

        const API_URL = 'https://safehub-backend-production.up.railway.app';

        // ==================== FETCH SERVERS ====================
        async function fetchServers() {
            try {
                console.log('[Safe Hub] Fetching servers...');
                const response = await fetch(`${API_URL}/api/servers`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('[Safe Hub] Received server data:', data);
                
                // Handle the data format from servers.json
                if (data.servers) {
                    serverData = data;
                } else if (Array.isArray(data)) {
                    serverData = { servers: data };
                } else {
                    serverData = { servers: [] };
                }
                
                renderServers(serverData.servers);
                renderPlayers(serverData.servers);
                updateServerSelect(serverData.servers);
                updateStats(serverData.servers);
                document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('[Safe Hub] Error fetching servers:', error);
                document.getElementById('serverGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <h3>Error Loading Servers</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // ==================== CONNECT WEBSOCKET ====================
        function connectWebSocket() {
            try {
                socket = new WebSocket(`wss://safehub-backend-production.up.railway.app`);
                
                socket.onopen = function() {
                    console.log('[Safe Hub] WebSocket connected');
                    document.getElementById('connectionStatus').textContent = '● Connected';
                    document.getElementById('connectionStatus').style.color = '#28a745';
                };
                
                socket.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('[Safe Hub] WebSocket data received:', data);
                        handleServerData(data);
                    } catch(e) {
                        console.error('[Safe Hub] Parse error:', e);
                    }
                };
                
                socket.onclose = function() {
                    console.log('[Safe Hub] WebSocket disconnected');
                    document.getElementById('connectionStatus').textContent = '● Disconnected';
                    document.getElementById('connectionStatus').style.color = '#dc3545';
                    setTimeout(connectWebSocket, 3000);
                };
                
                socket.onerror = function(error) {
                    console.error('[Safe Hub] WebSocket error:', error);
                };
            } catch(e) {
                console.log('[Safe Hub] WebSocket unavailable, using polling');
                startPolling();
            }
        }

        // ==================== POLLING FALLBACK ====================
        function startPolling() {
            setInterval(function() {
                fetchServers();
            }, 5000);
        }

        // ==================== HANDLE SERVER DATA ====================
        function handleServerData(data) {
            if (data.servers) {
                serverData = data;
            } else if (Array.isArray(data)) {
                serverData = { servers: data };
            } else {
                serverData = { servers: [] };
            }
            
            renderServers(serverData.servers);
            renderPlayers(serverData.servers);
            updateServerSelect(serverData.servers);
            updateStats(serverData.servers);
            document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderServers(servers) {
            const grid = document.getElementById('serverGrid');
            grid.innerHTML = '';
            
            if (!servers || servers.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📡</div>
                        <h3>No Active Servers</h3>
                        <p>Waiting for Safe Hub servers to connect</p>
                    </div>
                `;
                document.getElementById('serverCountLabel').textContent = '0 servers';
                document.getElementById('navServerCount').textContent = '0';
                return;
            }

            document.getElementById('serverCountLabel').textContent = `${servers.length} servers`;
            document.getElementById('navServerCount').textContent = servers.length;

            servers.forEach(server => {
                const card = document.createElement('div');
                
                let statusClass = 'online';
                let statusText = 'Online';
                let statusDot = 'online';
                
                if (server.isShuttingDown) {
                    statusClass = 'shutting-down';
                    statusText = 'Shutting Down';
                    statusDot = 'shutting-down';
                } else if (!server.online) {
                    statusClass = 'offline';
                    statusText = 'Offline';
                    statusDot = 'offline';
                }
                
                card.className = `server-card ${statusClass}`;
                card.dataset.serverId = server.serverId;

                const playerList = server.playerNames && server.playerNames.length > 0 
                    ? server.playerNames.map(name => 
                        `<span class="player-tag" onclick="selectPlayerFromCard('${escapeHtml(name)}', '${server.serverId}')">${escapeHtml(name)}</span>`
                      ).join('')
                    : '<span style="color:#5a6a7a;font-size:10px;">No players online</span>';

                const gamePageUrl = server.gamePageUrl || `https://www.roblox.com/games/${server.serverId || ''}`;

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="game-name">
                                ${escapeHtml(server.gameName || 'Unknown Game')}
                                <span class="infected-tag">Infected</span>
                            </div>
                            <div class="server-name">${escapeHtml(server.serverName || 'Unnamed Server')}</div>
                        </div>
                        <div>
                            <span class="status-indicator ${statusClass}">
                                <span class="status-dot ${statusDot}"></span>
                                ${statusText}
                            </span>
                        </div>
                    </div>
                    <div class="details-grid">
                        <div class="detail-item">
                            <span class="label">Players</span>
                            <span class="value">${server.players || 0} <span class="sub">/ ${server.maxPlayers || 50}</span></span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Region</span>
                            <span class="value">${escapeHtml(server.region || 'Unknown')}</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Latency</span>
                            <span class="value">${server.ping || 0}ms</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Map</span>
                            <span class="value">${escapeHtml(server.map || 'Unknown')}</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Uptime</span>
                            <span class="value">${server.uptime || '0s'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Server ID</span>
                            <span class="value" style="font-size:9px;color:#7a879a;font-weight:400;">${escapeHtml(String(server.serverId || '').substring(0, 12))}</span>
                        </div>
                    </div>
                    <div class="player-list">
                        <div class="title">Players Online</div>
                        <div class="player-tags">${playerList}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-success" onclick="selectServer('${server.serverId}')">Select Server</button>
                        <button class="btn btn-primary" onclick="window.open('${gamePageUrl}', '_blank')">Game Page</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function renderPlayers(servers) {
            const grid = document.getElementById('playerGrid');
            grid.innerHTML = '';
            
            let allPlayers = [];
            servers.forEach(server => {
                if (server.playerNames && server.playerNames.length > 0) {
                    server.playerNames.forEach(name => {
                        allPlayers.push({
                            name: name,
                            server: server.gameName || 'Unknown',
                            serverId: server.serverId
                        });
                    });
                }
            });
            
            if (allPlayers.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👤</div>
                        <h3>No Players Online</h3>
                        <p>Players will appear here when they join a server</p>
                    </div>
                `;
                document.getElementById('playerCountLabel').textContent = '0 players';
                document.getElementById('navPlayerCount').textContent = '0';
                return;
            }
            
            document.getElementById('playerCountLabel').textContent = `${allPlayers.length} players`;
            document.getElementById('navPlayerCount').textContent = allPlayers.length;
            
            allPlayers.forEach(player => {
                const card = document.createElement('div');
                card.className = 'server-card online';
                card.style.cursor = 'pointer';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="game-name">
                                ${escapeHtml(player.name)}
                            </div>
                            <div class="server-name">${escapeHtml(player.server)}</div>
                        </div>
                        <div>
                            <span class="status-indicator online">
                                <span class="status-dot online"></span>
                                Online
                            </span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-success" onclick="selectPlayerFromCard('${escapeHtml(player.name)}', '${player.serverId}')">Select Player</button>
                        <button class="btn btn-primary" onclick="selectServer('${player.serverId}')">View Server</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function updateStats(servers) {
            let totalPlayers = 0;
            let onlineServers = 0;

            servers.forEach(server => {
                if (server.online && !server.isShuttingDown) {
                    onlineServers++;
                    totalPlayers += server.players || 0;
                }
            });

            document.getElementById('serverCount').textContent = servers.length;
            document.getElementById('onlineCount').textContent = onlineServers;
            document.getElementById('playerCount').textContent = totalPlayers;
        }

        function updateServerSelect(servers) {
            const select = document.getElementById('serverSelect');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="">Select a server...</option>';
            
            servers.forEach(server => {
                if (server.online && !server.isShuttingDown) {
                    const option = document.createElement('option');
                    option.value = server.serverId;
                    option.textContent = `${server.gameName || 'Unknown'} - ${server.players || 0} players`;
                    select.appendChild(option);
                }
            });
            
            if (currentValue && [...select.options].some(opt => opt.value === currentValue)) {
                select.value = currentValue;
            }
        }

        function updatePlayerSelect(serverId) {
            const select = document.getElementById('playerSelect');
            select.innerHTML = '<option value="">Select a player...</option>';
            
            const server = serverData.servers.find(s => s.serverId === serverId);
            if (server && server.playerNames) {
                server.playerNames.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    select.appendChild(option);
                });
            }
        }

        function selectServer(serverId) {
            selectedServerId = serverId;
            document.getElementById('serverSelect').value = serverId;
            updatePlayerSelect(serverId);
            switchPage('commands');
            
            document.querySelectorAll('.server-card').forEach(card => {
                card.style.borderColor = card.dataset.serverId === serverId ? '#2d6bff' : '';
                card.style.borderWidth = card.dataset.serverId === serverId ? '2px' : '';
            });
        }

        function selectPlayerFromCard(playerName, serverId) {
            selectedPlayer = playerName;
            if (serverId) {
                selectServer(serverId);
            }
            document.getElementById('playerSelect').value = playerName;
            switchPage('commands');
            
            document.querySelectorAll('.player-tag').forEach(tag => {
                tag.classList.toggle('selected', tag.textContent === playerName);
            });
        }

        function clearSelection() {
            selectedServerId = null;
            selectedPlayer = null;
            document.getElementById('serverSelect').value = '';
            document.getElementById('playerSelect').innerHTML = '<option value="">Select a player...</option>';
            document.querySelectorAll('.player-tag').forEach(tag => tag.classList.remove('selected'));
            document.querySelectorAll('.server-card').forEach(card => {
                card.style.borderColor = '';
                card.style.borderWidth = '';
            });
        }

        function refreshPlayers() {
            if (selectedServerId) {
                updatePlayerSelect(selectedServerId);
            }
        }

        function executeCommand() {
            const serverId = document.getElementById('serverSelect').value;
            const player = document.getElementById('playerSelect').value;
            const command = document.getElementById('commandInput').value;
            const extra = document.getElementById('extraInput').value;
            const reason = document.getElementById('reasonInput').value;

            if (!serverId) {
                alert('Please select a target server');
                return;
            }

            if (!player) {
                alert('Please select a target player');
                return;
            }

            if (!command) {
                alert('Please select a command');
                return;
            }

            const commandData = {
                action: 'command',
                serverId: serverId,
                player: player,
                command: command,
                extra: extra,
                reason: reason,
                timestamp: new Date().toISOString()
            };

            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(commandData));
                alert(`Command "${command}" executed on ${player}`);
            } else {
                alert('WebSocket not connected. Command would be: ' + JSON.stringify(commandData, null, 2));
            }

            document.getElementById('reasonInput').value = '';
            document.getElementById('extraInput').value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function refreshData() {
            fetchServers();
        }

        function switchPage(page) {
            currentPage = page;
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + page).classList.add('active');
            
            const titles = {
                servers: ['Servers', 'Monitor all infected game servers in the network'],
                players: ['Players', 'View all players currently online across the network'],
                commands: ['Command Center', 'Execute administrative commands on selected servers and players']
            };
            
            document.getElementById('pageTitle').textContent = titles[page][0];
            document.getElementById('pageSubtitle').textContent = titles[page][1];
            
            if (page === 'players') {
                renderPlayers(serverData.servers);
            }
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('serverSelect').addEventListener('change', function() {
            if (this.value) {
                selectedServerId = this.value;
                updatePlayerSelect(this.value);
            } else {
                clearSelection();
            }
        });

        document.getElementById('playerSelect').addEventListener('change', function() {
            selectedPlayer = this.value;
        });

        // ==================== INITIALIZATION ====================
        fetchServers();
        connectWebSocket();

        // Refresh every 10 seconds as a fallback
        setInterval(fetchServers, 10000);

        console.log('[Safe Hub] Dashboard initialized');
    </script>
</body>
</html>
